name: Test Suite

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-suite-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tuxseo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tuxseo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: dev
      SECRET_KEY: test-secret-key
      DEBUG: "True"
      SITE_URL: http://localhost:8000
      POSTGRES_DB: tuxseo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      JINA_READER_API_KEY: test-jina-key
      GEMINI_API_KEY: test-gemini-key
      PERPLEXITY_API_KEY: test-perplexity-key
      KEYWORDS_EVERYWHERE_API_KEY: test-keywords-key
      PYTHONHASHSEED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q --strict-config --strict-markers

      - name: Upload content quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-quality-report
          path: artifacts/content-quality-report.json
          if-no-files-found: warn
